<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Shield - Phishing Detector</title>
    <style>
        body {
            background-color: #0E1117;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        h1 {
            color: #00ffcc;
        }
        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 5px;
            background-color: #00ffcc;
            cursor: pointer;
            font-weight: bold;
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>🛡️ AI Phishing URL Detector</h1>
    <p>Enter a website URL to check if it is safe or phishing.</p>

    <input type="text" id="urlInput" placeholder="Enter URL here">
    <button onclick="checkURL()">Check</button>

    <div class="result" id="result"></div>

    <script>
        function checkURL() {
            let url = document.getElementById("urlInput").value;
            let result = document.getElementById("result");

            if (url.includes("https")) {
                result.innerHTML = "✅ Likely Safe URL";
                result.style.color = "lightgreen";
            } else {
                result.innerHTML = "⚠️ Suspicious URL (Possible Phishing)";
                result.style.color = "red";
            }
        }
    </script>

</body>
</html>
